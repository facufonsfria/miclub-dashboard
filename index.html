<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiClub</title>

<style>
body { margin:0; font-family: sans-serif; display:flex; height:100vh; }

.sidebar {
  width:240px;
  background:#0F2560;
  color:white;
  padding:10px;
}

.nav-item {
  display:block;
  padding:10px;
  cursor:pointer;
  border:none;
  background:none;
  color:white;
  text-align:left;
  width:100%;
}

.nav-item.active {
  background:rgba(255,255,255,0.2);
}

.section { display:none; padding:20px; }
.section.active { display:block; }

.overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.overlay.visible { display:block; }
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <button class="nav-item active">Dashboard</button>
  <button class="nav-item">Socios</button>
  <button class="nav-item">Finanzas</button>
  <button class="nav-item">Información del Club</button>
  <button class="nav-item">Configuración</button>
</div>

<div style="flex:1;">
  <div id="sec-dashboard" class="section active">Dashboard</div>
  <div id="sec-socios" class="section">Socios</div>
  <div id="sec-finanzas" class="section">Finanzas</div>
  <div id="sec-informacion" class="section">Información</div>
  <div id="sec-configuracion" class="section">Configuración</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const sections = document.querySelectorAll(".section");
  const navItems = document.querySelectorAll(".nav-item");

  function goTo(sectionId, el) {
    sections.forEach(sec => sec.classList.remove("active"));
    document.getElementById("sec-" + sectionId).classList.add("active");

    navItems.forEach(i => i.classList.remove("active"));
    if (el) el.classList.add("active");
  }

  navItems.forEach(item => {
    item.addEventListener("click", function () {

      const text = item.innerText.toLowerCase();

      const map = {
        "dashboard": "dashboard",
        "socios": "socios",
        "finanzas": "finanzas",
        "información del club": "informacion",
        "configuración": "configuracion"
      };

      const key = Object.keys(map).find(k => text.includes(k));
      if (key) goTo(map[key], item);

    });
  });

});
</script>

</body>
</html>
